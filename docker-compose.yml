services:
  postgres:
    image: postgres:17-alpine
    container_name: uplatnica-qr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: uplatnica
      POSTGRES_PASSWORD: uplatnica
      POSTGRES_DB: uplatnica_qr
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U uplatnica -d uplatnica_qr']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
